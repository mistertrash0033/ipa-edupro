# ============================================================
# STEP 1: Run THIS workflow first to diagnose your secrets
# Save as: .github/workflows/debug-secrets.yml
# Go to Actions tab → "Debug Secrets" → Run workflow
# ============================================================

name: Debug Secrets

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: macos-latest
    steps:
      - name: Check all required secrets and variables
        env:
          P12_DATA: ${{ secrets.SIGNING_CERTIFICATE_P12_DATA }}
          P12_PASS: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          PP_DATA: ${{ secrets.PROVISIONING_PROFILE_DATA }}
        run: |
          echo "========================================"
          echo "CHECKING SECRETS"
          echo "========================================"

          # Check P12
          P12_LEN=${#P12_DATA}
          echo "SIGNING_CERTIFICATE_P12_DATA length: $P12_LEN chars"
          if [ "$P12_LEN" -eq 0 ]; then
            echo "❌ EMPTY — secret is not set or is blank"
          elif [ "$P12_LEN" -lt 100 ]; then
            echo "❌ TOO SHORT ($P12_LEN chars) — probably not a real P12"
          else
            echo "✅ Has content ($P12_LEN chars)"
            # Try decode
            python3 -c "
          import base64, os
          d = os.environ['P12_DATA']
          d = ''.join(d.split())
          try:
              decoded = base64.b64decode(d)
              print(f'  Decoded size: {len(decoded)} bytes')
              magic = decoded[:2].hex()
              print(f'  Magic bytes:  {magic}')
              if magic.startswith('30'):
                  print('  ✅ Looks like valid PKCS12/ASN.1')
              else:
                  print('  ❌ Invalid magic — not a PKCS12 file')
                  print('     Run on your Mac: base64 -i Certificates.p12 | pbcopy')
          except Exception as e:
              print(f'  ❌ base64 decode failed: {e}')
              print('     The secret contains invalid base64 characters')
            "
          fi

          echo ""

          # Check password
          PASS_LEN=${#P12_PASS}
          echo "SIGNING_CERTIFICATE_PASSWORD length: $PASS_LEN chars"
          if [ "$PASS_LEN" -eq 0 ]; then
            echo "⚠️  EMPTY — OK only if your P12 has no password"
          else
            echo "✅ Has content"
          fi

          echo ""

          # Check provisioning profile
          PP_LEN=${#PP_DATA}
          echo "PROVISIONING_PROFILE_DATA length: $PP_LEN chars"
          if [ "$PP_LEN" -eq 0 ]; then
            echo "❌ EMPTY — secret is not set"
          elif [ "$PP_LEN" -lt 100 ]; then
            echo "❌ TOO SHORT — probably not a real profile"
          else
            echo "✅ Has content ($PP_LEN chars)"
            python3 -c "
          import base64, os
          d = os.environ['PP_DATA']
          d = ''.join(d.split())
          try:
              decoded = base64.b64decode(d)
              print(f'  Decoded size: {len(decoded)} bytes')
              # Provisioning profiles are CMS/PKCS7 — start with 0x3082
              magic = decoded[:2].hex()
              print(f'  Magic bytes:  {magic}')
              if magic.startswith('30'):
                  print('  ✅ Looks like valid provisioning profile')
              else:
                  print('  ❌ Invalid — run: base64 -i YourApp.mobileprovision | pbcopy')
          except Exception as e:
              print(f'  ❌ base64 decode failed: {e}')
            "
          fi

          echo ""
          echo "========================================"
          echo "CHECKING VARIABLES"
          echo "========================================"
          echo "APP_NAME_SAFE:    '${{ vars.APP_NAME_SAFE }}'"
          echo "BUNDLE_ID:        '${{ vars.BUNDLE_ID }}'"
          echo "DEVELOPMENT_TEAM: '${{ vars.DEVELOPMENT_TEAM }}'"
          echo "CODE_SIGN_IDENTITY: '${{ vars.CODE_SIGN_IDENTITY }}'"
          echo "APP_SCHEME:       '${{ vars.APP_SCHEME }}'"

          [ -z "${{ vars.APP_NAME_SAFE }}"    ] && echo "❌ APP_NAME_SAFE is not set"    || echo "✅ APP_NAME_SAFE"
          [ -z "${{ vars.BUNDLE_ID }}"        ] && echo "❌ BUNDLE_ID is not set"        || echo "✅ BUNDLE_ID"
          [ -z "${{ vars.DEVELOPMENT_TEAM }}" ] && echo "❌ DEVELOPMENT_TEAM is not set" || echo "✅ DEVELOPMENT_TEAM"
          [ -z "${{ vars.CODE_SIGN_IDENTITY }}"] && echo "⚠️  CODE_SIGN_IDENTITY not set (will try auto-detect)" || echo "✅ CODE_SIGN_IDENTITY"
