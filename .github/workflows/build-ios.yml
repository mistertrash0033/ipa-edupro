name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      export_method:
        description: 'Export method'
        required: true
        default: 'ad-hoc'
        type: choice
        options:
          - ad-hoc
          - app-store
          - development
          - enterprise

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode version ──────────────────────────────────────────────
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ── 3. Install CocoaPods dependencies (if Podfile exists) ────────────────
      - name: Install CocoaPods
        run: |
          if [ -f "iOS-${{ vars.APP_NAME_SAFE }}/Podfile" ]; then
            cd "iOS-${{ vars.APP_NAME_SAFE }}"
            pod install --repo-update
          fi

      # ── 4. Import signing certificate ────────────────────────────────────────
      #   How to prepare:
      #   1. Export your .p12 from Keychain Access → base64 encode it:
      #      base64 -i Certificates.p12 | pbcopy
      #   2. Add as GitHub secret: SIGNING_CERTIFICATE_P12_DATA
      #   3. Add certificate password as: SIGNING_CERTIFICATE_PASSWORD
      - name: Import certificate
        env:
          SIGNING_CERTIFICATE_P12_DATA: ${{ secrets.SIGNING_CERTIFICATE_P12_DATA }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$SIGNING_CERTIFICATE_P12_DATA" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$SIGNING_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # Clean up p12
          rm /tmp/certificate.p12

      # ── 5. Install provisioning profile ──────────────────────────────────────
      #   How to prepare:
      #   1. Download .mobileprovision from Apple Developer portal
      #   2. base64 encode it: base64 -i YourApp.mobileprovision | pbcopy
      #   3. Add as GitHub secret: PROVISIONING_PROFILE_DATA
      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_DATA: ${{ secrets.PROVISIONING_PROFILE_DATA }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo "$PROVISIONING_PROFILE_DATA" | base64 --decode > "$PP_PATH"

          # Copy to Xcode provisioning profiles directory
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin \
            <<< $(security cms -D -i "$PP_PATH"))
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      # ── 6. Resolve workspace vs project ──────────────────────────────────────
      - name: Detect workspace or project
        id: xcode_project
        run: |
          IOS_DIR="iOS-${{ vars.APP_NAME_SAFE }}"
          if ls "$IOS_DIR"/*.xcworkspace 1> /dev/null 2>&1; then
            WORKSPACE=$(ls "$IOS_DIR"/*.xcworkspace | head -1)
            echo "build_flag=-workspace $WORKSPACE" >> $GITHUB_OUTPUT
            echo "Using workspace: $WORKSPACE"
          else
            PROJECT=$(ls "$IOS_DIR"/*.xcodeproj | head -1)
            echo "build_flag=-project $PROJECT" >> $GITHUB_OUTPUT
            echo "Using project: $PROJECT"
          fi

      # ── 7. Build archive (.xcarchive) ────────────────────────────────────────
      - name: Build archive
        env:
          BUNDLE_ID: ${{ vars.BUNDLE_ID }}
          CODE_SIGN_IDENTITY: ${{ vars.CODE_SIGN_IDENTITY }}    # e.g. "iPhone Distribution: Your Name (TEAMID)"
          DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM }}        # 10-char Apple Team ID
        run: |
          xcodebuild archive \
            ${{ steps.xcode_project.outputs.build_flag }} \
            -scheme "${{ vars.APP_NAME_SAFE }}" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -destination "generic/platform=iOS" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            CODE_SIGN_STYLE=Manual \
            | xcpretty

      # ── 8. Export IPA ─────────────────────────────────────────────────────────
      - name: Export IPA
        env:
          BUNDLE_ID: ${{ vars.BUNDLE_ID }}
          DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM }}
        run: |
          EXPORT_METHOD="${{ github.event.inputs.export_method || 'ad-hoc' }}"

          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>teamID</key>
            <string>${DEVELOPMENT_TEAM}</string>
            <key>bundleID</key>
            <string>${BUNDLE_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_UUID}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            | xcpretty

      # ── 9. Upload IPA as artifact ─────────────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ${{ vars.APP_NAME_SAFE }}-IPA
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30

      # ── 10. (Optional) Upload to TestFlight ──────────────────────────────────
      #   Uncomment to auto-upload to TestFlight after a successful build.
      #   Requires: APP_STORE_CONNECT_API_KEY_ID, APP_STORE_CONNECT_ISSUER_ID,
      #             APP_STORE_CONNECT_API_KEY_CONTENT (base64 .p8 file)
      # - name: Upload to TestFlight
      #   env:
      #     API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      #     ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      #     API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
      #   run: |
      #     mkdir -p ~/.appstoreconnect/private_keys
      #     echo "$API_KEY_CONTENT" | base64 --decode > \
      #       ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
      #     xcrun altool --upload-app \
      #       --type ios \
      #       --file $(ls $RUNNER_TEMP/ipa/*.ipa) \
      #       --apiKey "$API_KEY_ID" \
      #       --apiIssuer "$ISSUER_ID"
