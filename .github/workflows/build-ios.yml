name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      export_method:
        description: 'Export method'
        required: true
        default: 'ad-hoc'
        type: choice
        options:
          - ad-hoc
          - app-store
          - development
          - enterprise

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode ──────────────────────────────────────────────────────
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ── 3. Install CocoaPods ─────────────────────────────────────────────────
      - name: Install CocoaPods dependencies
        run: |
          IOS_DIR="iOS-${{ vars.APP_NAME_SAFE }}"
          if [ -f "$IOS_DIR/Podfile" ]; then
            cd "$IOS_DIR"
            pod install --repo-update
          else
            echo "No Podfile found, skipping pod install"
          fi

      # ── 4. Import signing certificate ────────────────────────────────────────
      #
      #   HOW TO PREPARE YOUR SECRET (run on your Mac):
      #     base64 -i /path/to/Certificates.p12 -o /dev/stdout | tr -d '\n'
      #   Paste the single-line output as secret: SIGNING_CERTIFICATE_P12_DATA
      #
      - name: Import certificate into keychain
        env:
          P12_DATA: ${{ secrets.SIGNING_CERTIFICATE_P12_DATA }}
          P12_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -hex 16)"

          # Strip all whitespace before decoding — this is the most common failure point
          echo "$P12_DATA" | tr -d '[:space:]' | base64 --decode > "$RUNNER_TEMP/cert.p12"

          echo "Cert file size: $(wc -c < "$RUNNER_TEMP/cert.p12") bytes"
          echo "Cert file type: $(file "$RUNNER_TEMP/cert.p12")"

          # Create a fresh, clean keychain
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # Import the certificate
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild

          # Allow codesign access without UI prompts (critical on macOS 13+)
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # Make this keychain searchable
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          echo "--- Available signing identities ---"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASS=$KEYCHAIN_PASS" >> $GITHUB_ENV

          rm -f "$RUNNER_TEMP/cert.p12"

      # ── 5. Install provisioning profile ──────────────────────────────────────
      #
      #   HOW TO PREPARE (run on your Mac):
      #     base64 -i /path/to/YourApp.mobileprovision -o /dev/stdout | tr -d '\n'
      #   Paste as secret: PROVISIONING_PROFILE_DATA
      #
      - name: Install provisioning profile
        env:
          PP_DATA: ${{ secrets.PROVISIONING_PROFILE_DATA }}
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"

          echo "$PP_DATA" | tr -d '[:space:]' | base64 --decode > "$PP_PATH"

          # Extract UUID
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" \
            /dev/stdin <<< "$(security cms -D -i "$PP_PATH")")

          echo "Profile UUID: $PROFILE_UUID"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision

          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      # ── 6. Detect workspace or project ───────────────────────────────────────
      - name: Detect Xcode workspace or project
        id: xcode_target
        run: |
          IOS_DIR="iOS-${{ vars.APP_NAME_SAFE }}"

          WORKSPACE=$(find "$IOS_DIR" -maxdepth 1 -name "*.xcworkspace" ! -name "*.xcodeproj" | head -1)
          PROJECT=$(find  "$IOS_DIR" -maxdepth 1 -name "*.xcodeproj"   | head -1)

          if [ -n "$WORKSPACE" ]; then
            echo "PROJECT_FLAG=-workspace \"$WORKSPACE\"" >> $GITHUB_OUTPUT
            echo "Using workspace: $WORKSPACE"
          elif [ -n "$PROJECT" ]; then
            echo "PROJECT_FLAG=-project \"$PROJECT\"" >> $GITHUB_OUTPUT
            echo "Using project: $PROJECT"
          else
            echo "❌ No Xcode project found in $IOS_DIR"
            ls -la "$IOS_DIR"
            exit 1
          fi

      # ── 7. List schemes (helps debug scheme name mismatches) ─────────────────
      - name: List available schemes
        run: |
          IOS_DIR="iOS-${{ vars.APP_NAME_SAFE }}"
          WORKSPACE=$(find "$IOS_DIR" -maxdepth 1 -name "*.xcworkspace" ! -name "*.xcodeproj" | head -1)
          PROJECT=$(find  "$IOS_DIR" -maxdepth 1 -name "*.xcodeproj" | head -1)
          TARGET="${WORKSPACE:-$PROJECT}"
          FLAG=$([ -n "$WORKSPACE" ] && echo "-workspace \"$TARGET\"" || echo "-project \"$TARGET\"")
          eval xcodebuild -list $FLAG 2>/dev/null || true

      # ── 8. Build archive ─────────────────────────────────────────────────────
      - name: Build .xcarchive
        run: |
          SCHEME="${{ vars.APP_SCHEME }}"
          # Fall back to APP_NAME_SAFE if APP_SCHEME var not set
          if [ -z "$SCHEME" ]; then
            SCHEME="${{ vars.APP_NAME_SAFE }}"
          fi

          eval xcodebuild archive \
            ${{ steps.xcode_target.outputs.PROJECT_FLAG }} \
            -scheme "\"$SCHEME\"" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            -destination "generic/platform=iOS" \
            PRODUCT_BUNDLE_IDENTIFIER="${{ vars.BUNDLE_ID }}" \
            CODE_SIGN_IDENTITY="${{ vars.CODE_SIGN_IDENTITY }}" \
            DEVELOPMENT_TEAM="${{ vars.DEVELOPMENT_TEAM }}" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            CODE_SIGN_STYLE=Manual \
            OTHER_CODE_SIGN_FLAGS="--keychain \"$KEYCHAIN_PATH\"" \
            | xcpretty

      # ── 9. Export IPA ────────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          EXPORT_METHOD="${{ github.event.inputs.export_method || 'ad-hoc' }}"
          IPA_DIR="$RUNNER_TEMP/ipa"

          # Write ExportOptions.plist using printf to avoid heredoc quoting issues
          printf '<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>%s</string>
            <key>teamID</key><string>%s</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>%s</key><string>%s</string>
            </dict>
            <key>stripSwiftSymbols</key><true/>
            <key>uploadBitcode</key><false/>
            <key>compileBitcode</key><false/>
            <key>thinning</key><string>&lt;none&gt;</string>
          </dict>
          </plist>' \
            "$EXPORT_METHOD" \
            "${{ vars.DEVELOPMENT_TEAM }}" \
            "${{ vars.BUNDLE_ID }}" \
            "$PROFILE_UUID" \
            > "$RUNNER_TEMP/ExportOptions.plist"

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            -exportPath "$IPA_DIR" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            | xcpretty

          echo "--- Exported files ---"
          ls -lh "$IPA_DIR"

      # ── 10. Upload IPA artifact ──────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ vars.APP_NAME_SAFE }}-IPA
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30

      # ── 11. Cleanup keychain ─────────────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      # ── 12. (Optional) Upload to TestFlight ──────────────────────────────────
      # Set repo variable UPLOAD_TO_TESTFLIGHT=true to enable.
      # Required secrets: APP_STORE_CONNECT_API_KEY_ID, APP_STORE_CONNECT_ISSUER_ID
      #                   APP_STORE_CONNECT_API_KEY_CONTENT (base64 .p8)
      #
      # - name: Upload to TestFlight
      #   if: vars.UPLOAD_TO_TESTFLIGHT == 'true'
      #   run: |
      #     mkdir -p ~/.appstoreconnect/private_keys
      #     echo "${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}" | base64 --decode \
      #       > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
      #     xcrun altool --upload-app --type ios \
      #       --file "$(ls $RUNNER_TEMP/ipa/*.ipa)" \
      #       --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
      #       --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
